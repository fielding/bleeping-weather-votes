 "wind-x-10", "text": "Sideways existence. Fucking accept it.", "subtext": "Perpendicular is gone.", "clean_text": "Sideways existence. Accept it.", "clean_subtext": "Perpendicular is gone.", "condition": "wind", "intensity": "extreme", "rank": 17, "in_seed": false}, {"id": "wind-x-b3-04", "text": "Open the door and the door kicks your ass.", "subtext": "", "clean_text": "Open the door and the door wins.", "clean_subtext": "", "condition": "wind", "intensity": "extreme", "rank": 18, "in_seed": false}, {"id": "wind-x-b3-02", "text": "Standing upright is a goddamn skill right now.", "subtext": "", "clean_text": "Standing upright is a skill now.", "clean_subtext": "", "condition": "wind", "intensity": "extreme", "rank": 19, "in_seed": false}, {"id": "wind-x-03", "text": "Your car's getting redecorated against its damn will.", "subtext": "Goodbye paint job.", "clean_text": "Your car's getting redecorated against its will.", "clean_subtext": "Goodbye paint job.", "condition": "wind", "intensity": "extreme", "rank": 20, "in_seed": false}, {"id": "wind-x-05", "text": "Doors are weapons. Windows are goddamn questionable.", "subtext": "", "clean_text": "Doors are weapons. Windows are questionable.", "clean_subtext": "", "condition": "wind", "intensity": "extreme", "rank": 21, "in_seed": false}]};
const SCORE = { slam: 2, keep: 1, skip: 0, cut: -2 };
const ACCENT = {
  hot: '#ff5f56', cold: '#61afef', rain: '#56b6c2', snow: '#abb2bf',
  wind: '#c678dd', humid: '#e5c07b', fog: '#8a93a3', storm: '#e06c75',
  perfect: '#98c379', freezing_rain: '#56b6c2', hail: '#e06c75',
  overcast: '#8a93a3', smoke_haze: '#d19a66',
};
// condition colors are tuned for dark surfaces; clamp lightness for paper text
const clampAccent = c => 'oklch(from ' + c + ' min(l, 0.52) c h)';
const phrases = Object.fromEntries(DATA.candidates.map(p => [p.id, p]));
let ballots = [], tab = 'all';

function tallyKey() {
  const url = new URL(location.href);
  let key = url.searchParams.get('key') || localStorage.getItem('bw-results-key') || '';
  if (url.searchParams.get('key')) {
    localStorage.setItem('bw-results-key', key);
    url.searchParams.delete('key');
    history.replaceState(null, '', url); // don't leave the secret in the address bar
  }
  if (!key) {
    key = prompt('Tally key (from infra/votes-worker/.tally_key):') || '';
    if (key) localStorage.setItem('bw-results-key', key.trim());
  }
  return (key || '').trim();
}

async function loadBallots() {
  const key = tallyKey();
  if (!key) return;
  document.getElementById('updated').textContent = 'loading…';
  try {
    const res = await fetch(SYNC_URL + '/votes?key=' + encodeURIComponent(key));
    if (res.status === 403) {
      localStorage.removeItem('bw-results-key');
      document.getElementById('updated').textContent = 'bad key — reload to retry';
      return;
    }
    ballots = (await res.json()).ballots || [];
    document.getElementById('updated').textContent =
      'updated ' + new Date().toLocaleTimeString() + ' — auto-refreshes every 60s';
    render();
  } catch (e) {
    document.getElementById('updated').textContent = 'fetch failed: ' + e;
  }
}

function tally() {
  const rows = {};
  for (const b of ballots) {
    for (const [id, v] of Object.entries(b.verdicts || {})) {
      if (!(v in SCORE) || !phrases[id]) continue;
      (rows[id] = rows[id] || { id, votes: {} }).votes[b.voter || b.key] = v;
    }
  }
  return Object.values(rows).map(r => {
    const vs = Object.values(r.votes);
    const counts = { slam: 0, keep: 0, cut: 0, skip: 0 };
    vs.forEach(v => counts[v]++);
    const score = vs.reduce((a, v) => a + SCORE[v], 0) / vs.length;
    const contested = (counts.slam + counts.keep) > 0 && counts.cut > 0;
    return { ...r, ...phrases[r.id], counts, n: vs.length, score, contested };
  }).sort((a, b) => b.score - a.score || b.n - a.n || (a.id < b.id ? -1 : 1));
}

function section(r) {
  if (r.score >= 1.5 && r.counts.slam > 0) return 'slams';
  if (r.contested) return 'contested';
  if (r.score <= -1) return 'cuts';
  return 'mid';
}

function render() {
  const rows = tally();
  const votesCast = rows.reduce((a, r) => a + r.n, 0);
  const cards = [
    [ballots.length, 'voters'],
    [votesCast, 'votes cast'],
    [rows.length, 'phrases rated'],
    [DATA.candidates.length - rows.length, 'unrated'],
    [rows.filter(r => section(r) === 'slams').length, 'slams'],
    [rows.filter(r => r.contested).length, 'contested'],
  ];
  document.getElementById('cards').innerHTML = cards.map(([n, l]) =>
    '<div class="card"><div class="num">' + n + '</div><div class="lbl">' + l + '</div></div>').join('');

  document.getElementById('voters').innerHTML = ballots.map(b => {
    const n = Object.keys(b.verdicts || {}).length;
    return '<span class="voter">' + esc(b.voter || b.key) + ' <small>' + n + '</small></span>';
  }).join('');

  const sel = document.getElementById('bucketSel');
  if (sel.options.length === 1) {
    [...new Set(DATA.candidates.map(p => p.condition + '/' + p.intensity))].sort()
      .forEach(b => sel.add(new Option(b, b)));
  }

  const q = document.getElementById('q').value.toLowerCase();
  const bucket = sel.value;
  const shown = rows.filter(r =>
    (tab === 'all' || section(r) === tab) &&
    (!bucket || r.condition + '/' + r.intensity === bucket) &&
    (!q || r.text.toLowerCase().includes(q) || (r.subtext || '').toLowerCase().includes(q)));

  document.getElementById('rows').innerHTML = shown.map(r => {
    const accent = ACCENT[r.condition] || '#fff';
    const who = Object.entries(r.votes).map(([voter, v]) =>
      '<b class="' + v + '">' + esc(voter) + '</b>').join(' · ');
    return '<div class="row"><div class="top">' +
      '<span class="score" style="color:' + (r.score >= 1 ? 'var(--keep)' : r.score <= -1 ? 'var(--cut)' : 'var(--dim)') + '">' +
      (r.score >= 0 ? '+' : '') + r.score.toFixed(2) + '</span>' +
      '<span class="pills">slam ' + r.counts.slam + ' · keep ' + r.counts.keep + ' · cut ' + r.counts.cut + ' · skip ' + r.counts.skip + '</span>' +
      '<span class="bucket-tag" style="color:' + clampAccent(accent) + '">' + r.condition + '/' + r.intensity + '</span>' +
      (r.in_seed ? '' : '<span class="bucket-tag">candidate</span>') +
      '</div><div class="phrase">' + esc(r.text) + '</div>' +
      (r.subtext ? '<div class="sub">' + esc(r.subtext) + '</div>' : '') +
      '<div class="who">' + who + '</div>' +
      '<div class="meta">' + r.id + '</div></div>';
  }).join('');
  document.getElementById('empty').style.display = rows.length ? 'none' : '';
}

function esc(s) {
  return String(s).replace(/[&<>"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[ch]));
}

document.querySelectorAll('button.tab[data-tab]').forEach(b => b.onclick = () => {
  tab = b.dataset.tab;
  document.querySelectorAll('button.tab[data-tab]').forEach(x => x.classList.toggle('active', x === b));
  render();
});
document.getElementById('q').addEventListener('input', render);
document.getElementById('bucketSel').addEventListener('change', render);

loadBallots();
setInterval(loadBallots, 60_000);
</script>
