<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Bleeping Weather — Phrase Curation</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {

    --cut: #e05c5c; --skip: #c8a24b; --border: #2a2f3a;
    --widget-font: ui-rounded, "SF Pro Rounded", -apple-system, "Helvetica Neue", sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, "Helvetica Neue", sans-serif;
    display: flex; height: 100vh; overflow: hidden;
  }
  #sidebar {
    width: 240px; min-width: 240px; background: var(--panel); padding: 12px;
    overflow-y: auto; border-right: 1px solid var(--border);
  }
  #sidebar h1 { font-size: 15px; margin: 4px 0 12px; color: var(--accent); }
  .bucket {
    display: flex; justify-content: space-between; padding: 5px 8px;
    border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--dim);
  }
  .bucket:hover { background: var(--panel2); }
  .bucket.active { background: var(--panel2); color: var(--text); }
  .bucket .done { color: var(--keep); }
  #main { flex: 1; display: flex; flex-direction: column; padding: 20px 24px; overflow-y: auto; }
  #progress { font-size: 13px; color: var(--dim); margin-bottom: 10px; }
  #progress b { color: var(--text); }
  #stage { margin: auto 0; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  #meta { font-size: 12px; color: var(--dim); display: flex; gap: 14px; }
  #verdictTag { font-weight: 700; }

  /* ——— widget replica (iOS medium widget) ——— */
  #widget {
    position: relative; width: 530px; height: 250px; border-radius: 32px;
    overflow: hidden; padding: 25px;
    display: flex; flex-direction: column; justify-content: space-between;
    background: linear-gradient(135deg, #0c0c14, #111122);
    box-shadow: 0 18px 50px rgba(0,0,0,0.55);
    outline: 2px solid transparent; outline-offset: 3px;
    font-family: var(--widget-font);
  }
  #widget.v-slam { outline-color: var(--slam); }
  #widget.v-keep { outline-color: var(--keep); }
  #widget.v-cut  { outline-color: var(--cut); opacity: 0.55; }
  #widget.v-skip { outline-color: var(--skip); }
  #glow { position: absolute; inset: 0; pointer-events: none; }
  #bgIcon {
    position: absolute; width: 440px; height: 440px; right: -110px; bottom: -110px;
    opacity: 0.12; pointer-events: none;
  }
  #topRow { display: flex; align-items: center; gap: 11px; position: relative; }
  #icon { width: 62px; height: 62px; }
  .icon-fallback { font-size: 44px; line-height: 62px; text-align: center; }
  #temp { font-size: 46px; font-weight: 300; color: rgba(255,255,255,0.7); }
  #phraseBlock { position: relative; }
  #phrase {
    font-size: 32px; font-weight: 600; color: #fff; line-height: 1.18;
    letter-spacing: 0.1px;
  }
  #phrase .kw { /* keyword accent applied inline */ }
  #subtext { font-size: 17px; font-weight: 500; color: rgba(255,255,255,0.62); margin-top: 7px; }

  #controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  button {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 16px; font-size: 14px; cursor: pointer;
  }
  button:hover { border-color: var(--dim); }
  button.slam { color: var(--slam); } button.keep { color: var(--keep); }
  button.cut { color: var(--cut); } button.skip { color: var(--skip); }
  #footer { margin-top: 14px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  #footer button { font-size: 13px; padding: 6px 12px; }
  kbd {
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    padding: 0 5px; font-size: 11px; color: var(--dim);
  }
  #help { text-align: center; font-size: 12px; color: var(--dim); margin-top: 10px; }
</style>
</head>

</div>

  const tag = document.getElementById('verdictTag');
  tag.textContent =
    v === 'slam' ? '🏆 GRAND SLAM' : v === 'keep' ? '✓ KEEP' : v === 'cut' ? '✗ CUT' : v === 'skip' ? '⏭ SKIPPED' : '';
  tag.style.color =
    v === 'slam' ? 'var(--slam)' : v === 'keep' ? 'var(--keep)' : v === 'cut' ? 'var(--cut)' : v === 'skip' ? 'var(--skip)' : '';

  const count = w => list.filter(q => verdicts[q.id] === w).length;
  const rated = list.filter(q => verdicts[q.id]).length;
  document.getElementById('progress').innerHTML =
    '<b>' + (idx + 1) + '</b> / ' + list.length + ' — rated ' + rated +
    ' (🏆 ' + count('slam') + ' · ✓ ' + count('keep') + ' · ✗ ' + count('cut') + ' · ⏭ ' + count('skip') + ')';
  renderBuckets();
}

function renderBuckets() {
  const el = document.getElementById('buckets');
  el.innerHTML = '';
  for (const b of buckets) {
    const items = phrases.filter(p => bucketKey(p) === b);
    const rated = items.filter(p => verdicts[p.id]).length;
    const div = document.createElement('div');
    div.className = 'bucket' + (bucketFilter === b ? ' active' : '');
    div.innerHTML = '<span>' + b + '</span><span class="' + (rated === items.length ? 'done' : '') + '">' +
      rated + '/' + items.length + '</span>';
    div.onclick = () => { bucketFilter = b; idx = 0; render(); };
    el.appendChild(div);
  }
  document.querySelector('[data-bucket="__all__"]').className =
    'bucket' + (bucketFilter === '__all__' ? ' active' : '');
  document.querySelector('[data-bucket="__all__"]').onclick =
    () => { bucketFilter = '__all__'; idx = 0; render(); };
}

let lastRate = 0;
function rate(v) {
  const now = performance.now();
  if (now - lastRate < 80) return;
  lastRate = now;
  const p = visible()[idx];
  if (!p) return;
  if (v) verdicts[p.id] = v; else delete verdicts[p.id];
  save();
  if (SYNC_URL) voterName(false); // prompts only if unnamed and not yet asked
  scheduleSync();
  if (v) nextUnrated(); else render();
}

function nextUnrated() {
  const list = visible();
  for (let i = 1; i <= list.length; i++) {
    const j = (idx + i) % list.length;
    if (!verdicts[list[j].id]) { idx = j; render(); return; }
  }
  render();
}

const SYNC_URL = 'https://bleeping-weather-votes.fielding-630.workers.dev'; // empty string disables auto-sync (export-file workflow)
const VOTER_KEY = 'bw-curation-voter';
const CLIENT_KEY = 'bw-curation-client';
const ASKED_KEY = 'bw-curation-asked'; // sessionStorage: don't re-nag after a cancelled prompt
function clientId() {
  let id = storage.getItem(CLIENT_KEY);
  if (!id) {
    id = Math.random().toString(36).slice(2, 8);
    storage.setItem(CLIENT_KEY, id);
  }
  return id;
}

let syncTimer = null, syncDirty = false, syncInFlight = false;
function setSyncStatus(text, ok) {
  const el = document.getElementById('syncChip');
  if (!el) return;
  el.textContent = text;
  el.style.color = ok ? 'var(--keep)' : 'var(--dim)';
}
function scheduleSync() {
  if (!SYNC_URL) return;
  syncDirty = true;
  setSyncStatus('syncing…', false);
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncNow, 1500);
}
async function syncNow() {
  if (!SYNC_URL || syncInFlight) return;
  const voter = currentVoter();
  if (!voter) return; // prompted on first rating; sync starts once asked
  syncInFlight = true;
  syncDirty = false;
  try {
    const res = await fetch(SYNC_URL + '/votes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ format: 'bw-curation-votes', version: 1, voter, client: clientId(), verdicts }),
    });
    if (!res.ok) throw new Error(res.status);
    setSyncStatus('synced ✓', true);
  } catch (e) {
    setSyncStatus('offline — votes saved in this browser', false);
  }
  syncInFlight = false;
  if (syncDirty) scheduleSync();
}
// best-effort flush when the tab closes mid-debounce
window.addEventListener('pagehide', () => {
  if (!SYNC_URL || !syncDirty) return;
  const voter = currentVoter();
  if (!voter) return;
  navigator.sendBeacon(SYNC_URL + '/votes', new Blob([JSON.stringify(
    { format: 'bw-curation-votes', version: 1, voter, client: clientId(), verdicts }
  )], { type: 'application/json' }));
});
function voterName(forceAsk) {
  let name = (storage.getItem(VOTER_KEY) || '').trim();
  if (name === 'anonymous') name = ''; // legacy cancelled-prompt value: ask again
  let asked = false;
  try { asked = !!sessionStorage.getItem(ASKED_KEY); } catch (e) {}
  if ((!name && (!asked || forceAsk)) || (name && forceAsk)) {
    const answer = (prompt('Name to attach to your votes (shows up in the tally):', name) || '').trim();
    try { sessionStorage.setItem(ASKED_KEY, '1'); } catch (e) {}
    if (answer) {
      name = answer;
      storage.setItem(VOTER_KEY, name);
    }
    renderVoter();
  }
  return name || 'anonymous'; // cancelled: vote as anonymous this session, ask again next visit
}
// non-prompting resolver for sync paths: empty string until the user has
// been asked at least once this session
function currentVoter() {
  const name = (storage.getItem(VOTER_KEY) || '').trim();
  if (name && name !== 'anonymous') return name;
  try { return sessionStorage.getItem(ASKED_KEY) ? 'anonymous' : ''; } catch (e) { return 'anonymous'; }
}
function renderVoter() {
  const name = storage.getItem(VOTER_KEY);
  document.getElementById('voterChip').textContent = name ? 'voting as ' + name : 'set voter name';
}
document.getElementById('voterChip').onclick = () => voterName(true);

function exportJSON(kind) {
  const voter = voterName(false);
  const slug = voter.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'anonymous';
  let payload, filename;
  if (kind === 'favorites') {
    payload = phrases.filter(p => ['slam', 'keep'].includes(verdicts[p.id]))
      .map(p => ({ ...p, verdict: verdicts[p.id], voter }));
    filename = 'favorites-' + slug + '.json';
  } else {
    payload = { format: 'bw-curation-votes', version: 1, voter, verdicts };
    filename = 'votes-' + slug + '.json';
  }
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

function importVerdicts() {
  const input = document.getElementById('importFile');
  input.onchange = () => {
    const reader = new FileReader();
    reader.onload = () => {
      const data = JSON.parse(reader.result);
      verdicts = Array.isArray(data)
        ? Object.fromEntries(data.map(p => [p.id, p.verdict]))
        : (data.verdicts || data);
      if (data.voter) storage.setItem(VOTER_KEY, data.voter);
      save(); scheduleSync(); renderVoter(); render();
    };
    reader.readAsText(input.files[0]);
  };
  input.click();
}

document.addEventListener('keydown', e => {
  if (e.metaKey || e.ctrlKey || e.repeat) return;
  switch (e.key) {
    case '1': rate('slam'); break;
    case '2': rate('keep'); break;
    case '3': rate('cut'); break;
    case '4': case 's': rate('skip'); break;
    case 'u': rate(null); break;
    case 'j': case ' ': e.preventDefault(); nextUnrated(); break;
    case 'k': case 'ArrowLeft': idx = Math.max(0, idx - 1); render(); break;
    case 'ArrowRight': idx = Math.min(visible().length - 1, idx + 1); render(); break;
    case 'c': showClean = !showClean; render(); break;
  }
});

if (SYNC_URL) {
  document.getElementById('doneHint').innerHTML =
    'votes sync automatically — rate as many or as few as you like, close the tab whenever';
  // manual export/import is the offline fallback; with sync on it's just clutter
  for (const b of document.querySelectorAll('#footer button')) b.style.display = 'none';
}
renderVoter();
render();
</script>
</body>
</html>
